<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Hub · Visualization</title>
    <!-- modern favicon (blue/teal circle) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%234a72ff'/%3E%3Ccircle cx='50' cy='50' r='20' fill='%2336d6b0'/%3E%3C/svg%3E">
    <!-- modern font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* === reset & base === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* theme variables – day & night */
        :root {
            --transition-theme: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.night {
            --depth-bg: #030614;
            --depth-card: rgba(8, 15, 26, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #cfdfff;
            --accent-1: #4a72ff;
            --accent-2: #36d6b0;
            --accent-glow: rgba(74, 114, 255, 0.7);
            --border-light: rgba(255, 255, 255, 0.1);
            --shadow-heavy: 0 35px 60px -15px #000000;
            --particle-color: #4a72ff;
            --sun-moon: #ffdd88;
            --toggle-bg: #0f1a2b;
            --card-inner-border: #ffffff0a;
            --table-header-bg: #1f2b41;
            --table-border: #2d3855;
        }

        body.day {
            --depth-bg: #eef5ff;
            --depth-card: rgba(255, 255, 255, 0.75);
            --text-primary: #0a2540;
            --text-secondary: #1f4172;
            --accent-1: #2b4cbe;
            --accent-2: #1f9a7a;
            --accent-glow: rgba(43, 76, 190, 0.6);
            --border-light: rgba(0, 30, 60, 0.2);
            --shadow-heavy: 0 25px 40px -10px rgba(0, 50, 100, 0.5);
            --particle-color: #2b4cbe;
            --sun-moon: #ffb347;
            --toggle-bg: #c3d9ff;
            --card-inner-border: rgba(0, 30, 60, 0.1);
            --table-header-bg: #c6d6ff;
            --table-border: #a0b5dd;
        }

        body {
            background: var(--depth-bg);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            padding: 1.5rem;
            transition: background-color var(--transition-theme), color var(--transition-theme);
            position: relative;
        }

        /* animated background */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, var(--accent-1) 0%, transparent 35%),
                radial-gradient(circle at 80% 70%, var(--accent-2) 0%, transparent 40%),
                radial-gradient(circle at 30% 80%, var(--accent-1) 0%, transparent 45%),
                repeating-linear-gradient(45deg, var(--accent-2) 0px, var(--accent-2) 2px, transparent 2px, transparent 8px);
            opacity: 0.15;
            filter: blur(50px) brightness(1.3);
            z-index: 0;
            animation: breathe 15s infinite alternate ease-in-out;
            pointer-events: none;
        }

        /* floating particles */
        .particle-field {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            box-shadow: 0 0 20px currentColor;
            animation: float-particle 25s infinite linear;
            transition: background var(--transition-theme);
            opacity: 0.5;
        }

        @keyframes float-particle {
            0% { transform: translateY(0) translateX(0); opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-120vh) translateX(20vw); opacity: 0; }
        }

        @keyframes breathe {
            0% { opacity: 0.2; filter: blur(40px); }
            100% { opacity: 0.6; filter: blur(70px); }
        }

        /* ===== navigation – glass morph ===== */
        #naviagation {
            margin: 0 0 2rem 0;
            background: var(--depth-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.75rem 1.5rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem 1rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-heavy);
            position: relative;
            z-index: 10;
        }

        #naviagation button {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.6rem 1.4rem;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            border: 1px solid transparent;
        }

        #naviagation button:hover {
            background: color-mix(in srgb, var(--accent-1) 15%, transparent);
            color: var(--text-primary);
            border-color: var(--accent-1);
            box-shadow: 0 0 15px var(--accent-1);
        }

        /* Data Visualization page active button */
        #naviagation button[onclick*="/visualization"] {
            background: linear-gradient(145deg, var(--accent-1), color-mix(in srgb, var(--accent-2) 70%, black)) !important;
            color: white !important;
            box-shadow: 0 8px 16px -6px #0e162b, 0 2px 0 0 var(--accent-2) inset, 0 0 20px var(--accent-1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #naviagation h4 {
            flex: 1;
            text-align: center;
            background: color-mix(in srgb, var(--accent-2) 10%, transparent);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--accent-2);
            color: var(--text-primary);
            font-weight: 500;
            letter-spacing: 0.5px;
            font-size: 1rem;
            box-shadow: 0 0 15px var(--accent-2);
        }

        #home {
            background: color-mix(in srgb, #f44d4d 10%, transparent) !important;
            border: 1px solid #f44d4d40 !important;
            color: var(--text-secondary) !important;
        }
        #home:hover {
            background: #f44d4d30 !important;
            border-color: #f44d4d !important;
            color: white !important;
            box-shadow: 0 0 20px #f44d4d;
        }

        /* theme toggle button inside navigation */
        #themeToggle {
            background: var(--toggle-bg);
            border: 1px solid var(--accent-1) !important;
            color: var(--sun-moon) !important;
            font-size: 1.4rem;
            padding: 0.6rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        #themeToggle:hover {
            transform: scale(1.1) rotate(10deg);
            border-color: var(--accent-2) !important;
            box-shadow: 0 0 20px var(--accent-2);
        }

        /* ===== section headings ===== */
        .univariate-section h3,
        .bivariate-section h3 {
            width: 100%;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent-1);
            padding-bottom: 0.4rem;
            margin-bottom: 1rem;
        }

        /* ===== cards containers ===== */
        .univariate-section,
        .bivariate-section {
            display: flex;
            gap: 1.8rem;
            flex-wrap: wrap;
            margin: 2rem 0;
            position: relative;
            z-index: 10;
        }

        /* ===== cards ===== */
        .univariate,
        .bivariate {
            flex: 1 1 280px;
            background: var(--depth-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-heavy), 0 0 0 1px var(--card-inner-border) inset;
            transition: transform 0.3s cubic-bezier(0.2,0.9,0.3,1), box-shadow 0.4s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .univariate::before,
        .bivariate::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            padding: 2px;
            background: linear-gradient(125deg, var(--accent-1), var(--accent-2), var(--accent-1), var(--accent-2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            animation: rotateBorder 6s linear infinite;
        }

        .univariate:hover::before,
        .bivariate:hover::before {
            opacity: 1;
        }

        .univariate:hover,
        .bivariate:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 50px -20px #000, 0 0 0 1px var(--accent-1) inset, 0 0 30px var(--accent-2);
            border-color: transparent;
        }

        .univariate h5,
        .bivariate h5 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent-2);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        /* dropdowns */
        select {
            background: color-mix(in srgb, var(--depth-bg) 70%, black);
            border: 1px solid var(--table-border);
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            width: 100%;
        }
        select:hover {
            border-color: var(--accent-1);
        }
        select:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-2) 30%, transparent);
        }

        /* plot buttons */
        .plot-btn {
            background: linear-gradient(145deg, color-mix(in srgb, var(--accent-1) 20%, black), color-mix(in srgb, var(--accent-2) 20%, black));
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 12px #00000060, 0 2px 0 0 var(--accent-2) inset;
            border: 1px solid #ffffff10;
            width: 100%;
        }
        .plot-btn:hover {
            background: linear-gradient(145deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 10px 18px -5px #000, 0 0 20px var(--accent-1);
            transform: scale(1.02);
        }

        /* images */
        img {
            margin-top: 0.5rem;
            width: 100%;
            border-radius: 24px;
            border: 2px solid var(--table-border);
            background: color-mix(in srgb, var(--depth-bg) 80%, black);
            transition: 0.3s;
        }
        img:hover {
            border-color: var(--accent-1);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* responsive */
        @media (max-width: 900px) {
            #naviagation { border-radius: 30px; padding: 0.75rem 1rem; }
            #naviagation h4 { flex: auto; width: 100%; order: 1; }
            #home { order: 2; }
            #themeToggle { order: 3; }
            .univariate, .bivariate { flex: 100%; }
        }

        /* override inline style on visualization button */
        #naviagation button[onclick*="/visualization"] {
            background: linear-gradient(145deg, var(--accent-1), color-mix(in srgb, var(--accent-2) 70%, black)) !important;
            color: white !important;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="night">
    <!-- floating particles -->
    <div class="particle-field" id="particleField"></div>

    <!-- navigation with integrated theme toggle -->
    <div id="naviagation">
        <button onclick="window.location.href = '/basic_info'">Basic Data Info</button>
        <button id="visualization" onclick="window.location.href = '/visualization'" style="background-color: #960dbc; color: white">Data Visualization</button>
        <button onclick="window.location.href = '/processing'">Data Processing</button>
        <button onclick="window.location.href = '/model'">Model Building</button>
        <h4>Data Visualization</h4>
        <button id="home" onclick="window.location.href = '/login'">Home</button>
        <!-- theme toggle button inside navigation -->
        <button id="themeToggle" title="switch day/night">🌙</button>
    </div>

    <div class="univariate-section">
        <h3>Univariate Categorical Analysis</h3>

        <div class="univariate" id="countplot">
            <h5>Countplot</h5>
            <select id="countplot_select">
                <option value="">--Select Column--</option>
            </select>
            <button class="plot-btn" onclick="generateCountPlot()">Generate Countplot</button>
            <img id="countplot_img" />
        </div>

        <div class="univariate" id="piechart">
            <h5>Pie Chart</h5>
            <select id="piechart_select">
                <option value="">--Select Column--</option>
            </select>
            <button class="plot-btn" onclick="generatePieChart()">Generate Pie Chart</button>
            <img id="piechart_img" />
        </div>
    </div>
    
    <div class="univariate-section">
        <h3>Univariate Numerical Analysis</h3>

        <div class="univariate">
            <h5>Histogram</h5>
            <select id="hist_select">
                <option value="">--Select Column--</option>
            </select>
            <button class="plot-btn" onclick="generateHist()">Generate Histogram</button>
            <img id="hist_img" />
        </div>

        <div class="univariate">
            <h5>KDE Plot</h5>
            <select id="kde_select">
                <option value="">--Select Column--</option>
            </select>
            <button class="plot-btn" onclick="generateKDE()">Generate KDE</button>
            <img id="kde_img" />
        </div>

        <div class="univariate">
            <h5>Boxplot</h5>
            <select id="box_select">
                <option value="">--Select Column--</option>
            </select>
            <button class="plot-btn" onclick="generateBox()">Generate Boxplot</button>
            <img id="box_img" />
        </div>
    </div>
    
    <div class="bivariate-section">
        <h3>Bivariate Analysis</h3>

        <div class="bivariate">
            <h5>Scatter Plot</h5>
            <select id="scat_x"></select>
            <select id="scat_y"></select>
            <button class="plot-btn" onclick="genScatter()">Generate</button>
            <img id="scat_img" />
        </div>

        <div class="bivariate">
            <h5>Boxplot (Hue)</h5>
            <select id="box_x"></select>
            <select id="box_y"></select>
            <select id="box_hue">
                <option value="">--Select Hue--</option>
            </select>
            <button class="plot-btn" onclick="genBoxBi()">Generate</button>
            <img id="box_bi_img" />
        </div>

        <div class="bivariate">
            <h5>Distplot</h5>
            <select id="dist_x"></select>
            <select id="dist_y"></select>
            <button class="plot-btn" onclick="genDist()">Generate</button>
            <img id="dist_img" />
        </div>

        <div class="bivariate">
            <h5>Barplot</h5>
            <select id="bar_x"></select>
            <select id="bar_y"></select>
            <button class="plot-btn" onclick="genBar()">Generate</button>
            <img id="bar_img" />
        </div>

        <div class="bivariate">
            <h5>Lineplot</h5>
            <select id="line_x"></select>
            <select id="line_y"></select>
            <button class="plot-btn" onclick="genLine()">Generate</button>
            <img id="line_img" />
        </div>

        <div class="bivariate">
            <h5>Heatmap</h5>
            <button class="plot-btn" onclick="genHeatmap()">Generate</button>
            <img id="heatmap_img" />
        </div>

        <div class="bivariate">
            <h5>Pair Plot</h5>
            <select id="pairplot_kind">
                <option value="scatter">Scatter</option>
                <option value="kde">KDE</option>
                <option value="reg">Regression</option>
                <option value="hist">Histogram</option>
            </select>
            <button class="plot-btn" onclick="genPairPlot()">Generate</button>
            <img id="pairplot_img" />
        </div>
    </div>

    <!-- script section (exactly same, plus day/night toggle logic) -->
    <script>
        fetch("/categorical")
            .then((r) => r.json())
            .then((cols) => {
                let countSelect = document.getElementById("countplot_select");
                let pieSelect = document.getElementById("piechart_select");

                cols.forEach((c) => {
                    let opt1 = document.createElement("option");
                    opt1.value = c;
                    opt1.textContent = c;
                    countSelect.appendChild(opt1);

                    let opt2 = document.createElement("option");
                    opt2.value = c;
                    opt2.textContent = c;
                    pieSelect.appendChild(opt2);
                });
            });

        function generateCountPlot() {
            let col = document.getElementById("countplot_select").value;
            if (!col) {
                alert("Select a column");
                return;
            }

            fetch("/countplot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ column: col }),
            })
                .then((r) => r.json())
                .then((d) => {
                    document.getElementById("countplot_img").src =
                        "data:image/png;base64," + d.image;
                });
        }

        function generatePieChart() {
            let col = document.getElementById("piechart_select").value;
            if (!col) {
                alert("Select a column");
                return;
            }

            fetch("/piechart", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ column: col }),
            })
                .then((r) => r.json())
                .then((d) => {
                    document.getElementById("piechart_img").src =
                        "data:image/png;base64," + d.image;
                });
        }
        
        fetch("/numerical")
            .then((r) => r.json())
            .then((cols) => {
                ["hist_select", "kde_select", "box_select"].forEach((id) => {
                    let sel = document.getElementById(id);
                    cols.forEach((c) => {
                        let opt = document.createElement("option");
                        opt.value = c;
                        opt.textContent = c;
                        sel.appendChild(opt);
                    });
                });
            });

        function generateHist() {
            let col = document.getElementById("hist_select").value;
            if (!col) return alert("Select column");

            fetch("/histogram", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ column: col }),
            })
                .then((r) => r.json())
                .then((d) => {
                    document.getElementById("hist_img").src =
                        "data:image/png;base64," + d.image;
                });
        }

        function generateKDE() {
            let col = document.getElementById("kde_select").value;
            if (!col) return alert("Select column");

            fetch("/kdeplot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ column: col }),
            })
                .then((r) => r.json())
                .then((d) => {
                    document.getElementById("kde_img").src =
                        "data:image/png;base64," + d.image;
                });
        }

        function generateBox() {
            let col = document.getElementById("box_select").value;
            if (!col) return alert("Select column");

            fetch("/boxplot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ column: col }),
            })
                .then((r) => r.json())
                .then((d) => {
                    document.getElementById("box_img").src =
                        "data:image/png;base64," + d.image;
                });
        }
        
        fetch("/get_columns")
            .then((r) => r.json())
            .then((cols) => {
                [
                    "scat_x",
                    "scat_y",
                    "box_x",
                    "box_y",
                    "box_hue",
                    "dist_x",
                    "dist_y",
                    "bar_x",
                    "bar_y",
                    "line_x",
                    "line_y",
                ].forEach((id) => {
                    let sel = document.getElementById(id);
                    let opt = document.createElement("option");
                    opt.value = "";
                    opt.textContent = "--Select--";
                    sel.appendChild(opt);

                    cols.forEach((c) => {
                        let o = document.createElement("option");
                        o.value = c;
                        o.textContent = c;
                        sel.appendChild(o);
                    });
                });
            });

        function genScatter() {
            sendBi("/scatterplot", "scat_x", "scat_y", "scat_img");
        }
        function genBoxBi() {
            let x = document.getElementById("box_x").value;
            let y = document.getElementById("box_y").value;
            let h = document.getElementById("box_hue").value;
            fetch("/boxplot_bi", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ x: x, y: y, hue: h }),
            })
                .then((r) => r.json())
                .then((d) => {
                    document.getElementById("box_bi_img").src =
                        "data:image/png;base64," + d.image;
                });
        }
        function genDist() {
            sendBi("/distplot_bi", "dist_x", "dist_y", "dist_img");
        }
        function genBar() {
            sendBi("/barplot_bi", "bar_x", "bar_y", "bar_img");
        }
        function genLine() {
            sendBi("/lineplot_bi", "line_x", "line_y", "line_img");
        }

        function sendBi(url, xid, yid, imgid) {
            let x = document.getElementById(xid).value;
            let y = document.getElementById(yid).value;
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ x: x, y: y }),
            })
                .then((r) => r.json())
                .then((d) => {
                    document.getElementById(imgid).src =
                        "data:image/png;base64," + d.image;
                });
        }

        function genHeatmap() {
            fetch("/heatmap")
                .then((r) => r.json())
                .then((d) => {
                    if (d.error) {
                        alert(d.error);
                        return;
                    }
                    document.getElementById("heatmap_img").src =
                        "data:image/png;base64," + d.image;
                });
        }
        function genPairPlot() {
            let kind = document.getElementById("pairplot_kind").value;

            fetch("/pairplot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ kind: kind }),
            })
                .then((r) => r.json())
                .then((d) => {
                    if (d.error) {
                        alert(d.error);
                        return;
                    }
                    document.getElementById("pairplot_img").src =
                        "data:image/png;base64," + d.image;
                });
        }

        // ========== DAY / NIGHT TOGGLE ==========
        (function() {
            const body = document.body;
            const toggleBtn = document.getElementById('themeToggle');
            
            function setTheme(theme) {
                body.classList.remove('day', 'night');
                body.classList.add(theme);
                toggleBtn.textContent = theme === 'night' ? '🌙' : '☀️';
            }

            toggleBtn.addEventListener('click', () => {
                const newTheme = body.classList.contains('night') ? 'day' : 'night';
                setTheme(newTheme);
            });

            // generate random floating particles
            const field = document.getElementById('particleField');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 8 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-10%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (Math.random() * 20 + 15) + 's';
                p.style.background = 'var(--particle-color)';
                field.appendChild(p);
            }
        })();
    </script>
</body>
</html>
